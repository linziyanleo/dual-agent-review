specanchor:
  version: "0.5.0-beta.1"
  project_name: "dual-agent-review"

  mode: "full"

  paths:
    global_specs: ".specanchor/global/"
    module_specs: ".specanchor/modules/"
    task_specs: ".specanchor/tasks/"
    archive: ".specanchor/archive/"
    spec_index: ".specanchor/spec-index.md"
    module_index: ".specanchor/module-index.md"  # DEPRECATED: v0.5 删除；迁移期仅作 fallback
    project_codemap: ".specanchor/project-codemap.md"
    findings: ".specanchor/findings/"
    sediment_proposals: ".specanchor/sediment/proposals/"

  # === v0.6 新增：workflow 段（默认 context-only，不再默认绑 sdd-riper-one） ===
  workflow:
    default: "context-only"   # context-only | lightweight | schema-driven
    schema: null              # null = 不启用任何 schema；可选：sdd-riper-one | simple | bug-fix | refactor | research | handoff
    optional_integrations:
      - simple
      - sdd-riper-one
      - handoff
      - bug-fix
      - refactor
      - research

  coverage:
    scan_paths:
      - "src/**"
    ignore_paths:
      - "src/**/*.test.*"
      - "src/**/*.spec.*"

  check:
    stale_days: 14
    outdated_days: 30
    warn_recent_commits_days: 14
    task_base_branch: "main"

  sync:
    auto_check_on_mr: true
    sprint_sync_reminder: true

  # === Harness Context Control 配置（v0.5.0-beta.1 引入） ===
  context_control:
    decision_log:
      hot_window: 5
      hot_types: [redirect, rollback, halt]
      respect_phase: true
    evidence_log:
      hot_window: 5
      hot_status: [failed, unverified-risk]
      auto_pin_acceptance: true
    enforce:
      hard_boundaries: error      # error | warning | off
      allowed_freedom: warning
      checkpoints_contract: warning
      evidence_ledger: warning
      handoff_packet: warning
    pre_commit:
      enabled: true
      blocking: false             # 开发期 warning-only；项目稳定后可切 true
